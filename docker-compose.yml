services:
  redis:
    image: redis:7-alpine
    container_name: woofey-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  server:
    build: ./server
    container_name: woofey-server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: woofey-frontend
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  redis-data:
