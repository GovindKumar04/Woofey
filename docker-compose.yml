services:
  redis:
    image: redis:7-alpine
    container_name: woofey-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  server:
    build: ./server/services/Auth
    container_name: woofey-auth-server
    ports:
    
      - "5000:5000"
    env_file:
      - ./server/services/Auth/.env
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    # Live reload: mount source, keep the image's node_modules.
    volumes:
      - ./server/services/Auth:/app
      - /app/node_modules
    command: ["node", "--watch", "index.js"]
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: woofey-frontend
    ports:
      - "5173:5173"
    # Live reload: mount source, keep the image's node_modules.
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - server
    restart: unless-stopped

volumes:
  redis-data:
